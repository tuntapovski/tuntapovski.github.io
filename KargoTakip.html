<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Kargo Takip</title>
		<link rel="stylesheet" href="https://mincss.com/entireframework.min.css">
	</head>
	<body>
		<div class="container">
			<h5></h5>
			<input id="no" placeholder="Kargo Takip No"> <input id="filter" placeholder="Filtre"> <button class="btn btn-b btn-sm" id="copy">Kopyala</button>
			<p>
			<p>
			<pre id="result"></pre>
		</div>
		
		<script>
			let n = document.querySelector('#no');
			let r = document.querySelector('#result');
			let f = document.querySelector('#filter');
			let c = document.querySelector('#copy');
			let db = [
				'https://gonderitakip.PTT.gov.tr/Track/Verify?q=@@',
				'http://kargotakip.ARASkargo.com.tr/mainpage.aspx?code=@@#ui-tabs-2',
				'https://kargotakip.MNGkargo.com.tr/gonderi-takip-detay?takipNo=@@',
				'https://www.YURTICIkargo.com/tr/online-servisler/gonderi-sorgula?code=@@',
				'https://www.SURATkargo.com.tr/KargoTakip/?kargotakipno=@@',
				'https://HEPSIjet.com/gonderi-takibi/@@',
				'https://www.UPS.com.tr/WaybillSorgu.aspx?Waybill=@@',
				'https://www.DHL.com.tr/exp-tr/express/tracking.html?AWB=@@&brand=DHL',
				'https://kargotakip.TRENDYOL.com/?orderNumber=@@'
			];
			
			function input_handler() {
				if (n.value.trim().length == 0) { r.innerHTML = ''; return; }
				let data = db.map(e => e.replace('@@', n.value.trim()))
				let i = new RegExp(f.value.trim() || '.', "i")
				data = data.filter(e => i.test(e));
				r.innerHTML = data.join('\n\n');
			}
			
			f.oninput = input_handler;
			n.oninput = input_handler;
			c.onclick = () => { navigator.clipboard.writeText(r.innerHTML); }
		</script>
	</body>
</html>
