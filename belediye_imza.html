<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kısayollar</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --btn-bg: #ffffff;
            --btn-text: #2563eb;
            --btn-border: #e2e8f0;
            --btn-hover-bg: #f1f5f9;
            --separator-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --btn-bg: #1e293b;
                --btn-text: #3b82f6;
                --btn-border: #334155;
                --btn-hover-bg: #1e293b;
                --separator-color: #334155;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
            opacity: 0.9;
        }

        /* Butonların yan yana ve esnek dizilmesi için */
        .links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            align-items: center;
        }

        .portal-btn {
            display: inline-flex;
            align-items: center;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--btn-border);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .portal-btn:hover {
            background-color: var(--btn-hover-bg);
            transform: translateY(-1px);
        }

        /* Dinamik eklenen yatay çizgi stili */
        .separator {
            flex-basis: 100%;
            height: 1px;
            background-color: var(--separator-color);
            margin: 0.75rem 0;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kısayollar</h1>
    
    <div id="linksContainer" class="links-container"></div>
</div>

<script>
    // Güncellenmiş dinamik liste (Araya separator objesi eklenmiştir)
    const portalData = [
        { name: "Parsel Sorgu", url: "https://parselsorgu.tkgm.gov.tr/" },
        { name: "YDS", url: "https://yds.csb.gov.tr/" },
        { name: "EBİS", url: "https://ebistr.com/" },
        { name: "Yapp360", url: "https://www.yapp360.com/" },
		{ name: "Nazım İmar Planı", url: "https://tuntapovski.github.io/m.html" },
        
        // Genel sistemler ile belediye imzaları arasına çizgi ekledim
        { type: "separator" },
        
        { name: "Akhisar İmza", url: "https://yapiruhsati.akhisar.bel.tr:8080/" },
        { name: "Salihli İmza", url: "https://imar.salihli.bel.tr/" },
        { name: "Soma İmza", url: "https://yapiruhsati.soma.bel.tr/" },
        { name: "Turgutlu İmza", url: "https://yapiruhsati.turgutlu.bel.tr:5443/" },
        { name: "Yunusemre İmza", url: "https://universe.yunusemre.bel.tr/" },
        { name: "Saruhanlı İmza", url: "https://e-imar.saruhanli.bel.tr:5545/" }
    ];

    // Butonları ve çizgileri dinamik olarak oluşturan fonksiyon
    function renderButtons() {
        const container = document.getElementById('linksContainer');
        
        portalData.forEach(portal => {
            // Eğer objenin tipi "separator" ise yatay çizgi (hr) oluşturur
            if (portal.type === "separator") {
                const hr = document.createElement('hr');
                hr.className = 'separator';
                container.appendChild(hr);
            } else {
                // Normal buton oluşturma işlemi
                const btn = document.createElement('a');
                btn.href = portal.url;
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.className = 'portal-btn';
                btn.innerText = portal.name;
                container.appendChild(btn);
            }
        });
    }

    // Sayfa yüklendiğinde çalıştır
    document.addEventListener('DOMContentLoaded', renderButtons);
</script>

</body>
</html>
